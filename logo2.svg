<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Pen / quill icon tilted diagonally like StudySync, black, transparent bg -->
  <g transform="translate(20,20) rotate(-40)">
    <!-- Pen barrel (body) -->
    <rect x="-4" y="-18" width="8" height="22" rx="2" fill="#111111"/>
    <!-- Pen tip / nib -->
    <polygon points="-4,4 4,4 1,14 -1,14" fill="#111111"/>
    <!-- Sharp nib point -->
    <polygon points="-1,13 1,13 0,18" fill="#111111"/>
    <!-- Pen top cap -->
    <rect x="-4" y="-22" width="8" height="6" rx="2" fill="#333333"/>
    <!-- Clip on pen -->
    <rect x="3" y="-20" width="2" height="18" rx="1" fill="#555555"/>
    <!-- Ink line on nib -->
    <line x1="0" y1="5" x2="0" y2="16" stroke="white" stroke-width="0.8" opacity="0.5"/>
  </g>
</svg>
