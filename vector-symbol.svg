<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Square border -->
  <rect x="20" y="20" width="60" height="60" rx="4"
        fill="none" stroke="#444444" stroke-width="6"/>
  <!-- Top-left dot -->
  <circle cx="20" cy="20" r="7" fill="#444444"/>
  <!-- Top-right dot -->
  <circle cx="80" cy="20" r="7" fill="#444444"/>
  <!-- Bottom-left dot -->
  <circle cx="20" cy="80" r="7" fill="#444444"/>
  <!-- Bottom-right dot -->
  <circle cx="80" cy="80" r="7" fill="#444444"/>
</svg>
